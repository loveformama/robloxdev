<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRDSOFT - Репозиторий Arduino Проектов</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #0a0a0f !important;
        }

        /* ===== SCROLLBAR & PATTERNS ===== */
        /* Красивый ползунок */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(180deg, #0a1720 0%, #0f0f0f 50%, #0a1720 100%);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 151, 157, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 80% 80%, rgba(0, 151, 157, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00979D 0%, #00b8bf 50%, #00979D 100%);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 151, 157, 0.5), inset 0 0 6px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 151, 157, 0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00b8bf 0%, #00d4d9 50%, #00b8bf 100%);
            box-shadow: 0 0 20px rgba(0, 151, 157, 0.8);
        }

        body {
            background: #0a0a0f !important;
            background-color: #0a0a0f !important;
            background: linear-gradient(135deg, #0a1720 0%, #0f0f0f 50%, #0a0a0f 100%) !important;
            background-attachment: fixed !important;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 151, 157, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 151, 157, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(0, 151, 157, 0.05) 50px, rgba(0, 151, 157, 0.05) 100px),
                radial-gradient(circle at 40% 60%, rgba(0, 100, 150, 0.08) 1px, transparent 1px) !important;
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px !important;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Геометрический паттерн на фоне */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 151, 157, 0.02) 25%, rgba(0, 151, 157, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 151, 157, 0.02) 75%, rgba(0, 151, 157, 0.02) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 151, 157, 0.02) 25%, rgba(0, 151, 157, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 151, 157, 0.02) 75%, rgba(0, 151, 157, 0.02) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        body > * {
            position: relative;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #0a1720 0%, #0f0f0f 100%) !important;
            background-image: 
                radial-gradient(circle at 10% 50%, rgba(0, 151, 157, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(0, 100, 150, 0.08) 0%, transparent 50%) !important;
            border-bottom: 2px solid #00979D;
            padding: 1.2rem 0;
            box-shadow: 0 4px 30px rgba(0, 151, 157, 0.15), inset 0 1px 0 rgba(0, 151, 157, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1150px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00979D;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 151, 157, 0.5);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo i {
            font-size: 1.8rem;
        }

        .header-info {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .project-count {
            background: rgba(0, 151, 157, 0.15);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border-left: 3px solid #00979D;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-count i {
            font-size: 1rem;
        }

        .btn-add-project {
            background: #00979D;
            color: #0f0f0f;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(0, 151, 157, 0.3);
        }

        .btn-add-project:hover {
            background: #00b8bf;
            box-shadow: 0 0 25px rgba(0, 151, 157, 0.6);
            transform: translateY(-2px);
        }

        .btn-add-project:active {
            transform: translateY(0);
        }

        /* ===== MAIN CONTAINER ===== */
        main {
            max-width: 1150px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ===== TABS NAVIGATION ===== */
        .tabs-container {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(0, 151, 157, 0.2);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.7rem 1.2rem;
            background: rgba(0, 151, 157, 0.1);
            color: #00979D;
            border: 2px solid transparent;
            border-bottom: 3px solid transparent;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: rgba(0, 151, 157, 0.2);
            box-shadow: 0 -4px 15px rgba(0, 151, 157, 0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 151, 157, 0.4) 0%, rgba(0, 151, 157, 0.15) 100%);
            border-bottom: 3px solid #00979D;
            color: #00d4d9;
            box-shadow: 0 -6px 20px rgba(0, 151, 157, 0.4), inset 0 1px 0 rgba(0, 151, 157, 0.2);
        }

        .tab-btn i {
            font-size: 1.2rem;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInTab 0.3s ease;
        }

        @keyframes fadeInTab {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== PROJECTS GRID ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .project-card {
            background: #1a1a1a;
            border: 2px solid rgba(0, 151, 157, 0.3);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .project-card:hover {
            border-color: #00979D;
            box-shadow: 0 0 20px rgba(0, 151, 157, 0.4);
            transform: translateY(-5px);
        }

        .project-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #0a1720 0%, #0f0f0f 100%);
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: rgba(0, 151, 157, 0.4);
        }

        .project-info {
            padding: 1rem;
        }

        .project-name {
            font-size: 0.95rem;
            color: #00979D;
            margin-bottom: 0.4rem;
            font-weight: 600;
            word-break: break-word;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .project-name i {
            font-size: 0.9rem;
        }

        .project-category {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(0, 151, 157, 0.2);
            color: #00979D;
            padding: 0.25rem 0.6rem;
            border-radius: 3px;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid rgba(0, 151, 157, 0.4);
        }

        .project-category i {
            font-size: 0.75rem;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95) !important;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: #1a1a1a;
            border: 2px solid #00979D;
            border-radius: 6px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideDown 0.3s ease;
            box-shadow: 0 0 40px rgba(0, 151, 157, 0.3);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(0, 151, 157, 0.3);
        }

        .modal-title {
            font-size: 1.3rem;
            color: #00979D;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00979D;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .modal-close:hover {
            color: #00b8bf;
            transform: scale(1.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00979D;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-family: 'Inter', sans-serif;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0f0f0f;
            border: 2px solid rgba(0, 151, 157, 0.3);
            border-radius: 4px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #00979D;
            box-shadow: 0 0 10px rgba(0, 151, 157, 0.3);
            background: #151515;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .file-input-wrapper {
            position: relative;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 0.8rem;
            background: #0f0f0f;
            border: 2px dashed rgba(0, 151, 157, 0.3);
            border-radius: 4px;
            text-align: center;
            color: #00979D;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-input-wrapper:hover .file-input-label {
            border-color: #00979D;
            background: rgba(0, 151, 157, 0.05);
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit,
        .btn-cancel {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background: #00979D;
            color: #0f0f0f;
            box-shadow: 0 0 15px rgba(0, 151, 157, 0.3);
        }

        .btn-submit:hover {
            background: #00b8bf;
            box-shadow: 0 0 25px rgba(0, 151, 157, 0.6);
        }

        .btn-submit:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-cancel {
            background: rgba(0, 151, 157, 0.2);
            color: #00979D;
            border: 1px solid rgba(0, 151, 157, 0.3);
        }

        .btn-cancel:hover {
            background: rgba(0, 151, 157, 0.1);
            border-color: #00979D;
        }

        /* ===== DETAIL VIEW ===== */
        .detail-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95) !important;
            z-index: 999;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .detail-container.active {
            display: block;
        }

        .detail-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid #00979D;
            border-radius: 6px;
            margin-top: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 40px rgba(0, 151, 157, 0.3);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(0, 151, 157, 0.3);
        }

        .detail-title-group h1 {
            font-size: 1.8rem;
            color: #00979D;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        .detail-category {
            display: inline-block;
            background: rgba(0, 151, 157, 0.2);
            color: #00979D;
            padding: 0.4rem 1rem;
            border-radius: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 1px solid rgba(0, 151, 157, 0.4);
        }

        .detail-close {
            background: none;
            border: none;
            color: #00979D;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            line-height: 1;
        }

        .detail-close:hover {
            color: #00b8bf;
            transform: scale(1.2);
        }

        .detail-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 2rem;
            border: 2px solid rgba(0, 151, 157, 0.3);
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section-title {
            font-size: 1.1rem;
            color: #00979D;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-left: 3px solid #00979D;
            padding-left: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .code-block {
            background: #0f0f0f;
            border: 1px solid rgba(0, 151, 157, 0.2);
            border-radius: 4px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .code-block pre {
            margin: 0;
            font-size: 0.85rem;
        }

        .code-block code {
            color: #e0e0e0;
        }

        .links-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .doc-link {
            display: inline-block;
            background: rgba(0, 151, 157, 0.1);
            color: #00979D;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(0, 151, 157, 0.4);
            border-radius: 4px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .doc-link:hover {
            background: rgba(0, 151, 157, 0.2);
            border-color: #00979D;
            box-shadow: 0 0 10px rgba(0, 151, 157, 0.3);
        }

        /* ===== LOADING STATE ===== */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #00979D;
        }

        .spinner {
            border: 3px solid rgba(0, 151, 157, 0.2);
            border-top: 3px solid #00979D;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .detail-content {
                margin: 1rem;
            }

            .detail-header {
                flex-direction: column-reverse;
                gap: 1rem;
            }
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: #666;
            border-top: 2px solid rgba(0, 151, 157, 0.2);
            margin-top: 2rem;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 151, 157, 0.05) 100%);
            font-size: 0.85rem;
        }

        footer span {
            color: #00979D;
        }

        /* ===== DATASHEET STYLES ===== */
        .datasheets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .datasheet-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 151, 157, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 100, 150, 0.05) 0%, transparent 50%);
            border: 2px solid rgba(0, 151, 157, 0.3);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .datasheet-card:hover {
            border-color: #00979D;
            box-shadow: 0 0 30px rgba(0, 151, 157, 0.5), 0 8px 25px rgba(0, 0, 0, 0.5);
            transform: translateY(-8px);
        }

        .datasheet-card-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(0, 151, 157, 0.2) 0%, rgba(0, 100, 150, 0.1) 100%);
            border-bottom: 2px solid rgba(0, 151, 157, 0.2);
        }

        .datasheet-card-title {
            color: #00979D;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .datasheet-card-meta {
            font-size: 0.8rem;
            color: #888;
        }

        .datasheet-card-body {
            padding: 1.5rem;
            color: #ccc;
            max-height: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rich-editor {
            background: #0f0f0f;
            border: 2px solid rgba(0, 151, 157, 0.3);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: linear-gradient(90deg, #1a1a1a 0%, #151515 100%);
            border-bottom: 1px solid rgba(0, 151, 157, 0.2);
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: rgba(0, 151, 157, 0.3);
            margin: 0 0.5rem;
        }

        .editor-btn {
            background: rgba(0, 151, 157, 0.15);
            color: #00979D;
            border: 1px solid rgba(0, 151, 157, 0.3);
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .editor-btn:hover {
            background: rgba(0, 151, 157, 0.25);
            border-color: #00979D;
        }

        .editor-btn.active {
            background: #00979D;
            color: #0f0f0f;
        }

        .editor-content {
            min-height: 300px;
            padding: 1.5rem;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
            outline: none;
            background: #0a0a0f;
        }

        .datasheet-form-group {
            margin-bottom: 1.5rem;
        }

        .datasheet-form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00979D;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .datasheet-form-input {
            width: 100%;
            padding: 0.8rem;
            background: #0f0f0f;
            border: 2px solid rgba(0, 151, 157, 0.3);
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .datasheet-form-input:focus {
            outline: none;
            border-color: #00979D;
            box-shadow: 0 0 10px rgba(0, 151, 157, 0.3);
            background: #151515;
        }

        .datasheets-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-create-datasheet {
            flex: 1;
            background: #00979D;
            color: #0f0f0f;
            border: none;
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 151, 157, 0.3);
        }

        .btn-create-datasheet:hover {
            background: #00b8bf;
            box-shadow: 0 0 25px rgba(0, 151, 157, 0.6);
            transform: translateY(-2px);
        }

        .btn-discard {
            flex: 1;
            background: rgba(0, 151, 157, 0.2);
            color: #00979D;
            border: 1px solid rgba(0, 151, 157, 0.3);
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-discard:hover {
            background: rgba(0, 151, 157, 0.1);
            border-color: #00979D;
        }

        .datasheet-editor-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
            background-image: 
                radial-gradient(circle at 10% 50%, rgba(0, 151, 157, 0.05) 0%, transparent 50%);
            border: 2px solid rgba(0, 151, 157, 0.2);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: none;
        }

        .datasheet-editor-section.active {
            display: block;
            animation: slideDown 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo"><i class="fas fa-microchip"></i> AIRDSOFT</div>
            <div class="header-info" style="display: flex; gap: 1.5rem; align-items: center;">
                <div class="project-count">
                    <i class="fas fa-list"></i> <span id="projectCount">0</span>
                </div>
                <button class="btn-add-project" id="btnAddProject" style="padding: 0.7rem 1.2rem; font-size: 0.9rem;"><i class="fas fa-plus"></i> <span style="display: none;@media (max-width: 1024px) { display: none; }">Проект</span></button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <!-- TABS NAVIGATION -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="repositories" title="Репозитории Arduino проектов">
                <i class="fas fa-cubes"></i> <span>Проекты</span>
            </button>
            <button class="tab-btn" data-tab="datasheets" title="Библиотека даташитов компонентов">
                <i class="fas fa-book"></i> <span>Даташиты</span>
            </button>
        </div>

        <!-- REPOSITORIES TAB -->
        <div class="tab-content active" id="repositories">
            <h2 style="font-size: 1.1rem; color: #00979D; margin-bottom: 1rem; font-family: 'Poppins', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 0.6rem;"><i class="fas fa-code-branch" style="font-size: 1.3rem;"></i> Мои Проекты</h2>
            
            <div class="projects-grid" id="projectsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-rocket"></i></div>
                    <p>Нет проектов</p>
                </div>
            </div>
        </div>

        <!-- DATASHEETS TAB -->
        <div class="tab-content" id="datasheets">
            <h2 style="font-size: 1.1rem; color: #00979D; margin-bottom: 1rem; font-family: 'Poppins', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 0.6rem;"><i class="fas fa-database" style="font-size: 1.3rem;"></i> Библиотека</h2>
            
            <!-- Datasheet Editor -->
            <div class="datasheet-editor-section" id="datasheetEditor">
                <h3 style="color: #00979D; margin-bottom: 1rem; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-plus-circle"></i> Новый даташит
                </h3>

                <div class="datasheet-form-group">
                    <label class="datasheet-form-label" for="datasheetTitle">
                        <i class="fas fa-h1"></i> Название
                    </label>
                    <input type="text" id="datasheetTitle" class="datasheet-form-input" placeholder="Название компонента">
                </div>

                <div class="datasheet-form-group">
                    <label class="datasheet-form-label" for="datasheetCategory">
                        <i class="fas fa-layer-group"></i> Тип
                    </label>
                    <select id="datasheetCategory" class="datasheet-form-input">
                        <option value="">Выберите</option>
                        <option value="microcontrollers"><i class="fas fa-chip"></i> Микроконтроллеры</option>
                        <option value="sensors"><i class="fas fa-sensor"></i> Датчики</option>
                        <option value="components"><i class="fas fa-cube"></i> Компоненты</option>
                        <option value="modules"><i class="fas fa-cubes"></i> Модули</option>
                        <option value="other">Прочее</option>
                    </select>
                </div>

                <div class="datasheet-form-group">
                    <label class="datasheet-form-label" for="datasheetImage">
                        <i class="fas fa-image"></i> Фото
                    </label>
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            <i class="fas fa-upload"></i> Загрузить
                            <input type="file" id="datasheetImage" accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="datasheet-form-group">
                    <label class="datasheet-form-label" style="display: flex; align-items: center; gap: 0.4rem;">
                        <i class="fas fa-pen"></i> Описание
                    </label>
                    <div class="rich-editor">
                        <div class="editor-toolbar">
                            <button class="editor-btn" onclick="formatText('bold')" type="button" title="Жирный">
                                <i class="fas fa-bold"></i>
                            </button>
                            <button class="editor-btn" onclick="formatText('italic')" type="button" title="Курсив">
                                <i class="fas fa-italic"></i>
                            </button>
                            <button class="editor-btn" onclick="formatText('underline')" type="button" title="Подчеркивание">
                                <i class="fas fa-underline"></i>
                            </button>
                            <div class="toolbar-separator"></div>
                            <button class="editor-btn" onclick="formatText('insertUnorderedList')" type="button" title="Список">
                                <i class="fas fa-list"></i>
                            </button>
                            <button class="editor-btn" onclick="insertLink()" type="button" title="Ссылка">
                                <i class="fas fa-link"></i>
                            </button>
                            <div class="toolbar-separator"></div>
                            <button class="editor-btn" onclick="formatText('formatBlock', 'h1')" type="button" title="Заголовок">
                                <i class="fas fa-heading"></i>
                            </button>
                        </div>
                        <div id="datasheetContent" class="editor-content" contenteditable="true" placeholder="Характеристики, пины, примеры..."></div>
                    </div>
                </div>

                <div class="datasheet-form-group">
                    <label class="datasheet-form-label" for="datasheetLink">
                        <i class="fas fa-file-pdf"></i> PDF
                    </label>
                    <input type="url" id="datasheetLink" class="datasheet-form-input" placeholder="https://...">
                </div>

                <div class="datasheets-actions">
                    <button class="btn-create-datasheet" onclick="saveDatasheet()" type="button">
                        <i class="fas fa-check"></i> Сохранить
                    </button>
                    <button class="btn-discard" onclick="cancelDatasheetEditor()" type="button">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>

            <!-- Datasheets Grid -->
            <div style="display: flex; justify-content: flex-end; margin-bottom: 1.5rem;">
                <button class="btn-add-project" id="btnAddDatasheet" onclick="openDatasheetEditor()" style="margin: 0; padding: 0.7rem 1.2rem; font-size: 0.9rem;">
                    <i class="fas fa-plus"></i> <span>Даташит</span>
                </button>
            </div>

            <div class="datasheets-grid" id="datasheetsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-book"></i></div>
                    <p>Нет даташитов</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ADD PROJECT MODAL -->
    <div class="modal" id="addProjectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem;"><i class="fas fa-rocket"></i> Проект</h2>
                <button class="modal-close" id="closeAddModal"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="projectForm">
                <div class="form-group">
                    <label class="form-label" for="projectName" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;"><i class="fas fa-pencil-alt"></i> Название</label>
                    <input type="text" id="projectName" class="form-input" placeholder="Название..." required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="projectCategory" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;"><i class="fas fa-layer-group"></i> Тип</label>
                    <select id="projectCategory" class="form-select" required>
                        <option value="">Выберите</option>
                        <option value="sensors"><i class="fas fa-microchip"></i> Датчики</option>
                        <option value="led"><i class="fas fa-lightbulb"></i> LED</option>
                        <option value="motors"><i class="fas fa-fan"></i> Моторы</option>
                        <option value="connectivity"><i class="fas fa-wifi"></i> WiFi/BLE</option>
                        <option value="display"><i class="fas fa-tv"></i> Дисплей</option>
                        <option value="audio"><i class="fas fa-volume-up"></i> Звук</option>
                        <option value="other"><i class="fas fa-puzzle-piece"></i> Прочее</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="projectCode" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;"><i class="fas fa-code"></i> Код</label>
                    <textarea id="projectCode" class="form-textarea" placeholder="Скопируйте ваш sketch код..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;"><i class="fas fa-image"></i> Фото</label>
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            <i class="fas fa-upload"></i> Загрузить
                            <input type="file" id="projectImage" accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="datasheetLink" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;"><i class="fas fa-link"></i> PDF</label>
                    <input type="url" id="datasheetLink" class="form-input" placeholder="https://...">
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-submit" id="submitBtn" style="font-size: 0.85rem;"><i class="fas fa-check"></i> Сохранить</button>
                    <button type="button" class="btn-cancel" id="cancelBtn" style="font-size: 0.85rem;"><i class="fas fa-times"></i> Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- PROJECT DETAIL VIEW -->
    <div class="detail-container" id="detailView">
        <div class="detail-content">
            <div class="detail-header">
                <div class="detail-title-group">
                    <h1 id="detailTitle">Название проекта</h1>
                    <span class="detail-category" id="detailCategory">Категория</span>
                </div>
                <button class="detail-close" id="closeDetailView"><i class="fas fa-times"></i></button>
            </div>

            <img id="detailImage" class="detail-image" src="" alt="Project Image" style="display: none;">

            <div class="detail-section">
                <h3 class="detail-section-title"><i class="fas fa-code"></i> Исходный код</h3>
                <div class="code-block">
                    <pre><code id="detailCode" class="language-cpp"></code></pre>
                </div>
            </div>

            <div class="detail-section" id="detailLinksSection" style="display: none;">
                <h3 class="detail-section-title"><i class="fas fa-file-pdf"></i> Документация</h3>
                <div class="links-section" id="detailLinks"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>AIRDSOFT © 2026 | Репозиторий Arduino проектов в реальном времени | Работает на <span>Firebase</span></p>
    </footer>

    <!-- FIREBASE SDK v9+ -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import {
            getFirestore,
            collection,
            addDoc,
            onSnapshot,
            query,
            orderBy,
            Timestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import {
            getStorage,
            ref,
            uploadBytes,
            getDownloadURL
        } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        // ===== FIREBASE CONFIGURATION =====
        // ВАЖНО: Firebase конфиг уже установлен
        const firebaseConfig = {
            apiKey: "AIzaSyCUN4coxW6yb7MwoTkbDDHa3URIDGDWuw8",
            authDomain: "math-project-8195b.firebaseapp.com",
            databaseURL: "https://math-project-8195b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "math-project-8195b",
            storageBucket: "math-project-8195b.firebasestorage.app",
            messagingSenderId: "947622423521",
            appId: "1:947622423521:web:3038ae8b6be7d8c9f740a0",
            measurementId: "G-J8JX4XPGHS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // ===== STATE =====
        let allProjects = [];
        let selectedImage = null;

        // ===== DOM ELEMENTS =====
        const projectsGrid = document.getElementById('projectsGrid');
        const addProjectModal = document.getElementById('addProjectModal');
        const projectForm = document.getElementById('projectForm');
        const detailView = document.getElementById('detailView');
        const projectCount = document.getElementById('projectCount');
        const projectImage = document.getElementById('projectImage');
        const submitBtn = document.getElementById('submitBtn');

        // ===== EVENT LISTENERS =====
        document.getElementById('btnAddProject').addEventListener('click', () => {
            addProjectModal.classList.add('active');
            projectForm.reset();
            selectedImage = null;
        });

        document.getElementById('closeAddModal').addEventListener('click', () => {
            addProjectModal.classList.remove('active');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            addProjectModal.classList.remove('active');
        });

        document.getElementById('closeDetailView').addEventListener('click', () => {
            detailView.classList.remove('active');
        });

        // Close modal on background click
        addProjectModal.addEventListener('click', (e) => {
            if (e.target === addProjectModal) {
                addProjectModal.classList.remove('active');
            }
        });

        detailView.addEventListener('click', (e) => {
            if (e.target === detailView) {
                detailView.classList.remove('active');
            }
        });

        // Image file selection
        projectImage.addEventListener('change', (e) => {
            selectedImage = e.target.files[0];
        });

        // Form submission
        projectForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Загрузка...';

            try {
                const projectName = document.getElementById('projectName').value;
                const projectCategory = document.getElementById('projectCategory').value;
                const projectCode = document.getElementById('projectCode').value;
                const datasheetLink = document.getElementById('datasheetLink').value;

                let imageURL = null;

                // Upload image if selected
                if (selectedImage) {
                    const imageRef = ref(storage, `projects/${Date.now()}_${selectedImage.name}`);
                    await uploadBytes(imageRef, selectedImage);
                    imageURL = await getDownloadURL(imageRef);
                }

                // Add project to Firestore
                const projectData = {
                    name: projectName,
                    category: projectCategory,
                    code: projectCode,
                    imageURL: imageURL,
                    datasheetLink: datasheetLink,
                    createdAt: Timestamp.now(),
                    updatedAt: Timestamp.now()
                };

                await addDoc(collection(db, 'projects'), projectData);

                // Reset form
                projectForm.reset();
                selectedImage = null;
                addProjectModal.classList.remove('active');

                submitBtn.disabled = false;
                submitBtn.textContent = 'Сохранить проект';

            } catch (error) {
                console.error('Error adding project:', error);
                alert('Ошибка при сохранении проекта: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Сохранить проект';
            }
        });

        // ===== RENDER FUNCTIONS =====
        function renderProjects(projects) {
            // Update project count
            projectCount.textContent = projects.length;

            if (projects.length === 0) {
                projectsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-rocket"></i></div>
                        <p>Нет проектов. Добавьте новый проект чтобы начать!</p>
                    </div>
                `;
                return;
            }

            projectsGrid.innerHTML = projects.map(project => `
                <div class="project-card" onclick="openProjectDetail('${project.id}')">
                    ${project.imageURL ? `
                        <img src="${project.imageURL}" alt="${project.name}" class="project-image">
                    ` : `
                        <div class="project-image"><i class="fas fa-wrench"></i></div>
                    `}
                    <div class="project-info">
                        <div class="project-name">${project.name}</div>
                        <span class="project-category">${getCategoryLabel(project.category)}</span>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryLabel(category) {
            const labels = {
                'sensors': '<i class="fas fa-microchip"></i> Датчики',
                'led': '<i class="fas fa-lightbulb"></i> LED & Освещение',
                'motors': '<i class="fas fa-bolt"></i> Моторы',
                'connectivity': '<i class="fas fa-wifi"></i> Связь',
                'display': '<i class="fas fa-tv"></i> Дисплеи',
                'audio': '<i class="fas fa-volume-up"></i> Аудио',
                'other': '<i class="fas fa-cube"></i> Прочее'
            };
            return labels[category] || category;
        }

        // Global function for opening project detail
        window.openProjectDetail = function(projectId) {
            const project = allProjects.find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('detailTitle').textContent = project.name;
            document.getElementById('detailCategory').textContent = getCategoryLabel(project.category);

            const detailImage = document.getElementById('detailImage');
            if (project.imageURL) {
                detailImage.src = project.imageURL;
                detailImage.style.display = 'block';
            } else {
                detailImage.style.display = 'none';
            }

            // Render code with syntax highlighting
            const codeElement = document.getElementById('detailCode');
            codeElement.textContent = project.code;
            codeElement.className = 'language-cpp';
            hljs.highlightElement(codeElement);

            // Render links
            const linksSection = document.getElementById('detailLinksSection');
            const detailLinks = document.getElementById('detailLinks');

            if (project.datasheetLink) {
                linksSection.style.display = 'block';
                detailLinks.innerHTML = `
                    <a href="${project.datasheetLink}" target="_blank" rel="noopener noreferrer" class="doc-link">
                        <i class="fas fa-file-pdf"></i> Даташит
                    </a>
                `;
            } else {
                linksSection.style.display = 'none';
            }

            detailView.classList.add('active');
            window.scrollTo(0, 0);
        };

        // ===== FIREBASE REAL-TIME LISTENER =====
        function setupRealtimeListener() {
            try {
                // Query projects ordered by creation date (newest first)
                const projectsQuery = query(
                    collection(db, 'projects'),
                    orderBy('createdAt', 'desc')
                );

                // Listen for real-time updates
                onSnapshot(projectsQuery, (snapshot) => {
                    allProjects = [];
                    snapshot.forEach((doc) => {
                        allProjects.push({
                            id: doc.id,
                            ...doc.data()
                        });
                    });
                    renderProjects(allProjects);
                }, (error) => {
                    console.error('Error listening to projects:', error);
                    if (error.code === 'permission-denied') {
                        console.warn('Проверьте Firestore Security Rules!');
                    }
                });
            } catch (error) {
                console.error('Error setting up listener:', error);
            }
        }

        // ===== INITIALIZATION =====
        setupRealtimeListener();

        // ===== TABS FUNCTIONALITY =====
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                
                // Remove active from all tabs and contents
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active to clicked tab and corresponding content
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // ===== DATASHEET FUNCTIONALITY =====
        let selectedDatasheetImage = null;

        document.getElementById('datasheetImage').addEventListener('change', (e) => {
            selectedDatasheetImage = e.target.files[0];
        });

        window.openDatasheetEditor = function() {
            document.getElementById('datasheetEditor').classList.add('active');
            window.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.cancelDatasheetEditor = function() {
            document.getElementById('datasheetEditor').classList.remove('active');
            document.getElementById('datasheetTitle').value = '';
            document.getElementById('datasheetCategory').value = '';
            document.getElementById('datasheetContent').innerHTML = '';
            document.getElementById('datasheetLink').value = '';
            selectedDatasheetImage = null;
        };

        window.formatText = function(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('datasheetContent').focus();
        };

        window.insertLink = function() {
            const url = prompt('Введите URL:');
            if (url) {
                document.execCommand('createLink', false, url);
            }
        };

        window.saveDatasheet = async function() {
            const title = document.getElementById('datasheetTitle').value;
            const category = document.getElementById('datasheetCategory').value;
            const content = document.getElementById('datasheetContent').innerHTML;
            const pdfLink = document.getElementById('datasheetLink').value;

            if (!title || !category || !content) {
                alert('Заполните все обязательные поля!');
                return;
            }

            try {
                let imageURL = null;

                if (selectedDatasheetImage) {
                    const imageRef = ref(storage, `datasheets/${Date.now()}_${selectedDatasheetImage.name}`);
                    await uploadBytes(imageRef, selectedDatasheetImage);
                    imageURL = await getDownloadURL(imageRef);
                }

                const datasheetData = {
                    title: title,
                    category: category,
                    content: content,
                    imageURL: imageURL,
                    pdfLink: pdfLink,
                    createdAt: Timestamp.now(),
                    updatedAt: Timestamp.now()
                };

                await addDoc(collection(db, 'datasheets'), datasheetData);

                cancelDatasheetEditor();
                alert('Даташит успешно сохранен!');

            } catch (error) {
                console.error('Error saving datasheet:', error);
                alert('Ошибка при сохранении даташита: ' + error.message);
            }
        };

        // ===== DATASHEETS REAL-TIME LISTENER =====
        function setupDatasheetsListener() {
            try {
                const datasheetsQuery = query(
                    collection(db, 'datasheets'),
                    orderBy('createdAt', 'desc')
                );

                onSnapshot(datasheetsQuery, (snapshot) => {
                    const datasheets = [];
                    snapshot.forEach((doc) => {
                        datasheets.push({
                            id: doc.id,
                            ...doc.data()
                        });
                    });
                    renderDatasheets(datasheets);
                }, (error) => {
                    console.error('Error listening to datasheets:', error);
                });
            } catch (error) {
                console.error('Error setting up datasheets listener:', error);
            }
        }

        function renderDatasheets(datasheets) {
            const grid = document.getElementById('datasheetsGrid');

            if (datasheets.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-book"></i></div>
                        <p>Нет даташитов. Создайте новый даташит чтобы начать!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = datasheets.map(ds => `
                <div class="datasheet-card" onclick="viewDatasheet('${ds.id}')">
                    ${ds.imageURL ? `
                        <img src="${ds.imageURL}" alt="${ds.title}" style="width: 100%; height: 200px; object-fit: cover;">
                    ` : `
                        <div style="width: 100%; height: 200px; background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%); display: flex; align-items: center; justify-content: center; color: rgba(0, 151, 157, 0.3); font-size: 3rem;"><i class="fas fa-microchip"></i></div>
                    `}
                    <div class="datasheet-card-header">
                        <div class="datasheet-card-title">${ds.title}</div>
                        <div class="datasheet-card-meta">${ds.category}</div>
                    </div>
                    <div class="datasheet-card-body">${ds.content.substring(0, 100).replace(/<[^>]*>/g, '')}...</div>
                </div>
            `).join('');
        }

        window.viewDatasheet = function(datasheetId) {
            alert('Просмотр даташита: ' + datasheetId + '\\nЭта функция будет расширена в следующем обновлении');
        };

        setupDatasheetsListener();

        // Log when Firebase is ready
        console.log('🚀 AIRDSOFT initialized with Firebase v10.7.0');
        console.log('📝 Configure Firebase credentials in the firebaseConfig object');
    </script>
</body>
</html>
